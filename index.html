<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Nexus</title>
    
    <!-- Link to the separate manifest file -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        html, body { overscroll-behavior-y: contain; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 overflow-hidden">

    <div id="app" class="flex h-screen w-full">
        <!-- SIDEBAR -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-72 bg-white border-r border-gray-200 flex flex-col transition-transform lg:relative lg:translate-x-0 -translate-x-full">
            <div class="p-6 border-b border-gray-200">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <div class="p-1.5 bg-blue-600 rounded-lg shadow-sm">
                            <i data-lucide="book-open" class="text-white w-5 h-5"></i>
                        </div>
                        <h1 class="text-lg font-bold tracking-tight">Nexus</h1>
                    </div>
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 text-gray-400 hover:text-red-600">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div class="space-y-2">
                    <button onclick="connectFolder()" class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition-all shadow-md shadow-blue-100">
                        <i data-lucide="folder-plus" class="w-4 h-4"></i>
                        Add Folder
                    </button>
                    <button onclick="clearLibrary()" class="w-full flex items-center justify-center gap-2 px-4 py-2 text-gray-400 hover:text-red-500 text-xs font-semibold transition-colors">
                        <i data-lucide="trash-2" class="w-3 h-3"></i>
                        Clear Library
                    </button>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-4 custom-scrollbar">
                <h2 class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3">Folders & Sources</h2>
                <div id="folder-tree" class="space-y-1">
                    <p class="px-3 text-xs text-gray-400 italic">No folders connected.</p>
                </div>
            </div>

            <div class="p-4 bg-gray-50 border-t border-gray-200">
                <div class="flex items-center gap-2 text-[10px] text-gray-400 font-bold uppercase tracking-tighter">
                    <div id="sync-indicator" class="w-2 h-2 rounded-full bg-gray-300"></div>
                    <span id="sync-text">Multi-Source Ready</span>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 flex flex-col min-w-0">
            <header class="h-16 border-b border-gray-200 bg-white flex items-center gap-3 px-4 md:px-6 shrink-0">
                <button onclick="toggleSidebar()" class="p-2 text-gray-500 hover:bg-gray-100 rounded-lg lg:hidden">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
                <div class="relative flex-1 max-w-xl">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4"></i>
                    <input type="text" id="search-input" oninput="handleSearch()" placeholder="Search library (names, content, tags)..." class="w-full pl-10 pr-4 py-2 bg-gray-100 border-transparent focus:bg-white focus:ring-2 focus:ring-blue-500 rounded-xl text-sm transition-all outline-none">
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-4 md:p-6 custom-scrollbar">
                <div class="max-w-6xl mx-auto">
                    <div class="mb-6 flex justify-between items-end">
                        <div>
                            <h2 id="view-title" class="text-xl md:text-2xl font-bold text-gray-800">Unified Library</h2>
                            <p class="text-xs text-gray-400 mt-1">Searching across all connected folders</p>
                        </div>
                        <p id="file-count" class="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full border border-blue-100">0 files</p>
                    </div>
                    <div id="file-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                        <div class="col-span-full py-20 flex flex-col items-center justify-center text-center opacity-50">
                            <i data-lucide="folder-search" class="w-12 h-12 mb-4 text-gray-300"></i>
                            <p class="text-gray-500 font-medium">Click "Add Folder" to import your OneDrive apps</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- EDITOR MODAL -->
        <div id="editor-modal" class="hidden fixed inset-0 z-50 flex justify-end">
            <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeEditor()"></div>
            <div class="relative w-full md:max-w-3xl bg-white shadow-2xl h-full flex flex-col transition-transform duration-300">
                <header class="px-6 py-4 border-b border-gray-100 flex items-center justify-between bg-white shrink-0">
                    <div class="min-w-0">
                        <h2 id="edit-filename" class="text-lg font-bold truncate">Filename.md</h2>
                        <p id="edit-meta" class="text-[10px] text-gray-400 font-bold uppercase tracking-widest"></p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="save-btn" onclick="saveChanges()" class="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">
                            <i data-lucide="save" class="w-4 h-4"></i> Save
                        </button>
                        <button onclick="closeEditor()" class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
                            <i data-lucide="x" class="w-6 h-6 text-gray-400"></i>
                        </button>
                    </div>
                </header>
                <textarea id="editor-textarea" class="flex-1 p-6 md:p-10 font-mono text-base outline-none resize-none bg-gray-50 text-gray-800 leading-relaxed"></textarea>
                <footer class="p-4 bg-white border-t border-gray-100 flex justify-between text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                    <span id="word-count">0 words</span>
                    <span>Editing Mode</span>
                </footer>
            </div>
        </div>
    </div>

    <script>
        let files = [];
        let selectedFile = null;
        let searchQuery = "";
        let selectedSource = null;

        function init() {
            lucide.createIcons();
            
            // Register standard Service Worker file
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').then(() => {
                    console.log('Nexus Service Worker registered.');
                }).catch(err => console.log('SW registration failed:', err));
            }
        }

        function clearLibrary() {
            if(confirm("Are you sure you want to clear all connected folders? (This won't delete your actual files)")) {
                files = [];
                selectedSource = null;
                renderFolderTree();
                renderFiles();
            }
        }

        async function connectFolder() {
            if (!('showDirectoryPicker' in window)) {
                alert("The File System Access API is not supported in this browser. Please use Chrome or Edge on PC.");
                return;
            }

            try {
                const directoryHandle = await window.showDirectoryPicker();
                updateSyncStatus('Adding Folder...', 'bg-amber-500');
                await scanDirectory(directoryHandle, directoryHandle.name);
                renderFolderTree();
                renderFiles();
                updateSyncStatus('Sync Active', 'bg-green-500');
            } catch (err) {
                console.error(err);
                updateSyncStatus('Ready', 'bg-gray-300');
            }
        }

        async function scanDirectory(handle, rootName, currentPath = "") {
            for await (const entry of handle.values()) {
                if (entry.kind === 'file' && entry.name.endsWith('.md')) {
                    const fileData = await entry.getFile();
                    const content = await fileData.text();
                    files.push({
                        id: Math.random().toString(36).substr(2, 9),
                        name: entry.name,
                        content: content,
                        path: currentPath || 'Root',
                        source: rootName,
                        handle: entry,
                        updatedAt: new Date(fileData.lastModified).toISOString()
                    });
                } else if (entry.kind === 'directory') {
                    const newPath = currentPath ? `${currentPath}/${entry.name}` : entry.name;
                    await scanDirectory(entry, rootName, newPath);
                }
            }
        }

        function renderFiles() {
            const grid = document.getElementById('file-grid');
            const countLabel = document.getElementById('file-count');
            const q = searchQuery.toLowerCase();
            const filtered = files.filter(f => {
                const matchesSearch = f.name.toLowerCase().includes(q) || 
                                     f.content.toLowerCase().includes(q) || 
                                     f.path.toLowerCase().includes(q) ||
                                     f.source.toLowerCase().includes(q);
                const matchesSource = !selectedSource || f.source === selectedSource;
                return matchesSearch && matchesSource;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 flex flex-col items-center justify-center text-center opacity-50"><i data-lucide="search-x" class="w-12 h-12 mb-4 text-gray-300"></i><p class="text-gray-500 font-medium">No files found.</p></div>`;
            } else {
                grid.innerHTML = filtered.map(file => `
                    <div onclick="openEditor('${file.id}')" class="bg-white p-5 rounded-2xl border border-gray-200 hover:border-blue-400 hover:shadow-lg transition-all cursor-pointer flex flex-col h-48 group">
                        <div class="flex justify-between items-start mb-3">
                            <div class="p-2 bg-blue-50 text-blue-600 rounded-lg group-hover:bg-blue-600 group-hover:text-white transition-colors"><i data-lucide="file-text" class="w-5 h-5"></i></div>
                            <span class="text-[9px] uppercase font-bold tracking-widest px-2 py-0.5 rounded-full border bg-blue-50 text-blue-600 border-blue-100">${file.source}</span>
                        </div>
                        <h3 class="font-bold text-gray-900 truncate">${file.name}</h3>
                        <p class="text-[10px] text-gray-400 mb-2 truncate uppercase font-bold tracking-tighter"><i data-lucide="folder" class="inline w-3 h-3 mr-1"></i> ${file.path}</p>
                        <p class="text-sm text-gray-500 line-clamp-2 italic overflow-hidden">"${file.content.substring(0, 80)}..."</p>
                    </div>
                `).join('');
            }
            countLabel.innerText = `${filtered.length} files`;
            lucide.createIcons();
        }

        function renderFolderTree() {
            const tree = document.getElementById('folder-tree');
            const sources = [...new Set(files.map(f => f.source))].sort();
            if (sources.length === 0) {
                tree.innerHTML = '<p class="px-3 text-xs text-gray-400 italic">No folders connected.</p>';
                return;
            }
            tree.innerHTML = `<div onclick="filterBySource(null)" class="flex items-center gap-2 px-3 py-2 text-sm font-medium ${!selectedSource ? 'bg-blue-50 text-blue-600' : 'text-gray-600 hover:bg-gray-100'} rounded-lg cursor-pointer transition-colors"><i data-lucide="layers" class="w-4 h-4"></i>All Sources</div>` + sources.map(source => `
                <div onclick="filterBySource('${source}')" class="flex items-center gap-2 px-3 py-2 text-sm font-medium ${selectedSource === source ? 'bg-blue-50 text-blue-600' : 'text-gray-600 hover:bg-gray-100'} rounded-lg cursor-pointer transition-colors"><i data-lucide="database" class="w-4 h-4"></i>${source}</div>`).join('');
            lucide.createIcons();
        }

        function filterBySource(source) { selectedSource = source; renderFolderTree(); renderFiles(); }
        function handleSearch() { searchQuery = document.getElementById('search-input').value; renderFiles(); }

        function openEditor(id) {
            selectedFile = files.find(f => f.id === id);
            document.getElementById('edit-filename').innerText = selectedFile.name;
            document.getElementById('edit-meta').innerText = `${selectedFile.source} / ${selectedFile.path}`;
            document.getElementById('editor-textarea').value = selectedFile.content;
            document.getElementById('editor-modal').classList.remove('hidden');
            updateWordCount();
            lucide.createIcons();
        }

        function updateWordCount() {
            const text = document.getElementById('editor-textarea').value;
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;
            document.getElementById('word-count').innerText = `${words} words`;
        }

        function closeEditor() { document.getElementById('editor-modal').classList.add('hidden'); }

        async function saveChanges() {
            const newContent = document.getElementById('editor-textarea').value;
            try {
                if (selectedFile.handle) {
                    const writable = await selectedFile.handle.createWritable();
                    await writable.write(newContent);
                    await writable.close();
                }
                selectedFile.content = newContent;
                selectedFile.updatedAt = new Date().toISOString();
                const saveBtn = document.getElementById('save-btn');
                const originalHTML = saveBtn.innerHTML;
                saveBtn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i> Saved';
                saveBtn.classList.replace('bg-blue-600', 'bg-emerald-600');
                renderFiles();
                setTimeout(() => { saveBtn.innerHTML = originalHTML; saveBtn.classList.replace('bg-emerald-600', 'bg-blue-600'); lucide.createIcons(); }, 2000);
            } catch (err) { alert("Permission denied. Ensure the folder is still accessible."); }
            lucide.createIcons();
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
        function updateSyncStatus(text, colorClass) {
            const dot = document.getElementById('sync-indicator');
            const label = document.getElementById('sync-text');
            dot.className = `w-2 h-2 rounded-full ${colorClass}`;
            label.innerText = text;
        }

        window.onload = init;
        document.getElementById('editor-textarea').addEventListener('input', updateWordCount);
    </script>
</body>
</html>
